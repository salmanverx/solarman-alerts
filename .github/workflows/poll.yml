name: Solarman alert poller

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_alert:
        description: 'Send a test ntfy notification only (skip real polling)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run poller
        env:
          SOLARMAN_EMAIL: ${{ secrets.SOLARMAN_EMAIL }}
          SOLARMAN_PASSWORD: ${{ secrets.SOLARMAN_PASSWORD }}
          SOLARMAN_APP_ID: ${{ secrets.SOLARMAN_APP_ID }}
          SOLARMAN_APP_SECRET: ${{ secrets.SOLARMAN_APP_SECRET }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TEST_ALERT: ${{ inputs.test_alert }}
        run: python poller.py

      - name: Commit updated state
        run: |
          git config user.name "solarman-poller-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update poller state"
          git push
